<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>📤 Separar Pedido - Cards</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { text-align: center; background: #111; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
    
    .container-cards { display: flex; flex-direction: column; gap: 15px; align-items: center; margin-top: 20px; }
    .card { 
      background: #222; border: 1px solid #444; padding: 20px; width: 90%; max-width: 450px; 
      border-radius: 12px; cursor: pointer; text-align: left; transition: 0.3s; position: relative;
    }
    .card:hover { border-color: #2e7d32; transform: translateY(-2px); background: #2a2a2a; }
    .card h3 { margin: 0 0 8px 0; color: #4caf50; display: flex; justify-content: space-between; }
    .card p { margin: 4px 0; font-size: 14px; color: #bbb; }
    .badge { background: #2e7d32; color: white; padding: 4px 8px; border-radius: 5px; font-size: 12px; }
    
    #reader { width: 100%; max-width: 500px; margin: 20px auto; border-radius: 8px; display: none; }
    .status-box { background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #333; display: none; margin-bottom: 20px; }
    .btn-voltar { background: #444; color: white; padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin: 5px; }
    .btn-finalizar { background: #f57c00; color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; margin-top: 20px; display: none; }
    
    #loading { margin: 50px; font-style: italic; color: #888; }
    #contagem { color: #4caf50; font-weight: bold; font-size: 22px; margin-top: 10px; display: block; }
    .limite-atingido { color: #f44336 !important; }
  </style>
</head>
<body>

  <h1>📤 Pedidos Pendentes</h1>
  
  <div id="view-lista">
    <button class="btn-voltar" onclick="window.location.href='index.html'">⬅ Voltar</button>
    <div id="loading">Buscando pedidos na planilha...</div>
    <div id="container-pedidos" class="container-cards"></div>
  </div>

  <div id="view-scanner" style="display: none;">
    <div class="status-box" id="status-container" style="display: block;">
      <h2 id="profAtivo" style="color: #4caf50; margin: 0;"></h2>
      <p id="pedidoID" style="color: #888;"></p>
      <div id="feedback" style="font-size: 1.2em; margin: 15px 0; min-height: 1.5em;">Aguardando leitura do QR Code...</div>
      
      <span id="contagem">0 / 0</span>
      
      <br>
      <button class="btn-voltar" onclick="fecharScanner()">⬅ Mudar Pedido</button>
      <button class="btn-finalizar" id="btnFinalizar" onclick="finalizar()">✅ Finalizar Entrega</button>
    </div>
    <div id="reader"></div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbwy2JvVfE1vZ_Tp2LAEfsSoOlgzgCCCKotsVTUOWY6CFPloFrgvt_mpQ8VVQoeqN0QF/exec";
    let idPedidoAtual = "";
    let qtdSolicitada = 0;
    let itensBipados = []; 
    const scanner = new Html5Qrcode("reader");

    window.onload = carregarPedidos;

    function carregarPedidos() {
      fetch(`${BASE_URL}?acao=listar_pedidos`)
        .then(res => res.json())
        .then(data => {
          document.getElementById('loading').style.display = 'none';
          const container = document.getElementById('container-pedidos');
          container.innerHTML = "";

          if (data.length === 0) {
            container.innerHTML = "<p>Nenhum pedido pendente encontrado.</p>";
            return;
          }

          data.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
              <h3>${p.professor} <span class="badge">${p.id}</span></h3>
              <p><b>Quantidade solicitada:</b> ${p.quantidade} unidades</p>
              <p><b>Data/Hora:</b> ${p.horarioPedido}</p>
            `;
            card.onclick = () => iniciarScan(p.id, p.professor, p.quantidade);
            container.appendChild(card);
          });
        })
        .catch(err => {
          document.getElementById('loading').innerText = "Erro ao carregar pedidos.";
        });
    }

    function iniciarScan(id, professor, qtd) {
      idPedidoAtual = id;
      qtdSolicitada = parseInt(qtd);
      itensBipados = []; 
      
      document.getElementById('view-lista').style.display = 'none';
      document.getElementById('view-scanner').style.display = 'block';
      document.getElementById('reader').style.display = 'block';
      document.getElementById('profAtivo').innerText = "Prof. " + professor;
      document.getElementById('pedidoID').innerText = "ID: " + id;
      
      atualizarContador();
      document.getElementById('btnFinalizar').style.display = 'none';
      
      const config = { fps: 10, qrbox: 250 };
      scanner.start({ facingMode: "environment" }, config, qrCodeMessage => {
        const idLido = qrCodeMessage.trim();
        
        if (itensBipados.includes(idLido)) return;

        if (itensBipados.length >= qtdSolicitada) {
          document.getElementById('feedback').innerText = "⚠️ Limite de " + qtdSolicitada + " já atingido!";
          return;
        }
        
        scanner.pause();
        const url = `${BASE_URL}?id=${idLido}&acao=verificar_item`;
        
        fetch(url)
          .then(res => res.text())
          .then(msg => {
            if (msg.startsWith("OK:")) {
              itensBipados.push(idLido);
              document.getElementById('feedback').innerText = "✅ " + msg.split(":")[1] + " separado!";
              atualizarContador();
              document.getElementById('btnFinalizar').style.display = 'inline-block';
            } else {
              document.getElementById('feedback').innerText = "❌ Erro!";
              alert(msg);
            }
            
            if (itensBipados.length < qtdSolicitada) {
                setTimeout(() => { scanner.resume(); }, 800);
            } else {
                document.getElementById('feedback').innerText = "✨ Pedido Completo!";
                document.getElementById('contagem').classList.add('limite-atingido');
            }
          })
          .catch(err => {
            alert("Erro na conexão: " + err);
            scanner.resume();
          });
      });
    }

    function atualizarContador() {
        const el = document.getElementById('contagem');
        el.innerText = itensBipados.length + " / " + qtdSolicitada;
        el.classList.remove('limite-atingido');
    }

    // 🔧 ALTERAÇÃO AQUI
    function fecharScanner() {

      fetch(`${BASE_URL}?acao=cancelar_reservas`)
        .then(() => {
          scanner.stop().then(() => {
            location.reload();
          });
        })
        .catch(() => {
          scanner.stop().then(() => {
            location.reload();
          });
        });

    }

    function finalizar() {
      if (!confirm("Confirmar a entrega de " + itensBipados.length + " itens?")) return;
      
      const url = `${BASE_URL}?idPedido=${idPedidoAtual}&listaIds=${itensBipados.join(",")}&acao=vincular_em_massa`;
      
      fetch(url).then(res => res.text()).then(msg => {
        alert(msg);
        location.reload();
      });
    }
  </script>
</body>
</html>
