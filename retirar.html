<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>📤 Separar Pedido - Cards</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { text-align: center; background: #111; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
    
    .container-cards { display: flex; flex-direction: column; gap: 15px; align-items: center; margin-top: 20px; }
    .card { 
      background: #222; border: 1px solid #444; padding: 20px; width: 90%; max-width: 450px; 
      border-radius: 12px; cursor: pointer; text-align: left; transition: 0.3s;
    }
    .card:hover { border-color: #2e7d32; transform: translateY(-2px); background: #2a2a2a; }
    .card h3 { margin: 0 0 8px 0; color: #4caf50; display: flex; justify-content: space-between; }
    .card p { margin: 4px 0; font-size: 14px; color: #bbb; }
    .badge { background: #2e7d32; padding: 4px 8px; border-radius: 5px; font-size: 12px; }

    #reader { width: 100%; max-width: 500px; margin: 20px auto; display: none; }
    .status-box { background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #333; display: none; margin-bottom: 20px; }

    .btn-voltar, .btn-finalizar {
      padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; margin: 5px;
    }
    .btn-voltar { background: #444; color: white; }
    .btn-finalizar { background: #f57c00; color: white; display: none; }

    #contagem { color: #4caf50; font-weight: bold; font-size: 18px; margin-top: 10px; display: block; }
  </style>
</head>
<body>

<h1>📤 Pedidos Pendentes</h1>

<div id="view-lista">
  <button class="btn-voltar" onclick="window.location.href='index.html'">⬅ Voltar</button>
  <div id="loading">Buscando pedidos...</div>
  <div id="container-pedidos" class="container-cards"></div>
</div>

<div id="view-scanner" style="display:none;">
  <div class="status-box" id="status-container" style="display:block;">
    <h2 id="profAtivo"></h2>
    <p id="pedidoID"></p>
    <div id="feedback">Aguardando leitura...</div>
    <span id="contagem"></span>

    <button class="btn-voltar" onclick="fecharScanner()">⬅ Voltar</button>
    <button class="btn-finalizar" id="btnFinalizar" onclick="finalizar()">Finalizar</button>
  </div>

  <div id="reader"></div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
const BASE_URL = "SUA_URL_AQUI";

let idPedidoAtual = "";
let itensBipados = [];
let quantidadeMaxima = 0;

const scanner = new Html5Qrcode("reader");

window.onload = carregarPedidos;

function carregarPedidos() {
  fetch(`${BASE_URL}?acao=listar_pedidos`)
    .then(res => res.json())
    .then(data => {
      document.getElementById('loading').style.display = 'none';
      const container = document.getElementById('container-pedidos');
      container.innerHTML = "";

      data.forEach(p => {
        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
          <h3>${p.professor} <span class="badge">${p.id}</span></h3>
          <p>Quantidade: ${p.quantidade}</p>
        `;

        card.onclick = () => iniciarScan(p.id, p.professor, p.quantidade);
        container.appendChild(card);
      });
    });
}

function iniciarScan(id, professor, quantidade) {
  idPedidoAtual = id;
  itensBipados = [];
  quantidadeMaxima = quantidade;

  document.getElementById('view-lista').style.display = 'none';
  document.getElementById('view-scanner').style.display = 'block';
  document.getElementById('reader').style.display = 'block';

  document.getElementById('profAtivo').innerText = professor;
  document.getElementById('pedidoID').innerText = "ID: " + id;
  document.getElementById('contagem').innerText = `0/${quantidadeMaxima}`;
  document.getElementById('btnFinalizar').style.display = 'none';

  scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, qrCodeMessage => {

    // 🚫 BLOQUEIO DE LIMITE
    if (itensBipados.length >= quantidadeMaxima) {
      document.getElementById('feedback').innerText = "⚠️ Limite atingido!";
      scanner.pause();
      return;
    }

    const idLido = qrCodeMessage.trim();

    // 🚫 DUPLICADO
    if (itensBipados.includes(idLido)) return;

    scanner.pause();

    fetch(`${BASE_URL}?id=${idLido}&acao=verificar_item`)
      .then(res => res.text())
      .then(msg => {

        if (msg.startsWith("OK:")) {

          // 🚫 DUPLA PROTEÇÃO
          if (itensBipados.length >= quantidadeMaxima) return;

          itensBipados.push(idLido);

          document.getElementById('feedback').innerText = "OK!";
          document.getElementById('contagem').innerText =
            `${itensBipados.length}/${quantidadeMaxima}`;

          document.getElementById('btnFinalizar').style.display = 'inline-block';

          // 🔥 AUTO BLOQUEIO FINAL
          if (itensBipados.length === quantidadeMaxima) {
            document.getElementById('feedback').innerText = "✅ Completo!";
            scanner.pause();
          }

        } else {
          alert(msg);
        }

        setTimeout(() => scanner.resume(), 800);
      });

  });
}

function fecharScanner() {
  scanner.stop().then(() => location.reload());
}

function finalizar() {
  if (itensBipados.length === 0) {
    alert("Leia pelo menos 1 item");
    return;
  }

  fetch(`${BASE_URL}?idPedido=${idPedidoAtual}&listaIds=${itensBipados.join(",")}&acao=vincular_em_massa`)
    .then(res => res.text())
    .then(msg => {
      alert(msg);
      location.reload();
    });
}
</script>

</body>
</html>
