<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>📤 Separar Pedido</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { text-align: center; background: #111; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
    #reader { width: 100%; max-width: 500px; margin: 20px auto; border-radius: 8px; display: none; }
    button { font-size: 18px; padding: 12px 20px; margin: 10px; cursor: pointer; border-radius: 5px; border: none; min-width: 150px; }
    .btn-voltar { background: #444; color: white; }
    .btn-iniciar { background: #2e7d32; color: white; }
    .btn-finalizar { background: #f57c00; color: white; display: none; margin-top: 20px; }
    input { padding: 12px; font-size: 16px; border-radius: 5px; border: 1px solid #444; width: 80%; max-width: 300px; background: #222; color: white; margin-bottom: 15px; }
    .status-box { margin: 15px; padding: 10px; border: 1px dashed #555; display: none; }
  </style>
</head>
<body>

  <h1>📤 Separar Pedido</h1>
  
  <div id="setup-container">
    <p>Digite o ID do Pedido (P001...):</p>
    <input type="text" id="idPedidoInput" placeholder="Ex: P001">
    <br>
    <button class="btn-voltar" onclick="voltar()">⬅ Voltar</button>
    <button class="btn-iniciar" onclick="iniciarSeparacao()">Bipar Itens</button>
  </div>

  <div id="status-container" class="status-box">
    <strong id="pedidoAtivo"></strong><br>
    <span id="feedback">Aguardando leitura...</span>
    <br>
    <button id="btnFinalizar" class="btn-finalizar" onclick="finalizar()">✅ Finalizar Entrega</button>
  </div>

  <div id="reader"></div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    let idPedidoAtual = "";
    const scanner = new Html5Qrcode("reader");
    
    // AQUI ESTÁ A MUDANÇA: Usando o link que deu certo no seu teste!
    const BASE_URL = "https://script.google.com/macros/s/AKfycbwy2JvVfE1vZ_Tp2LAEfsSoOlgzgCCCKotsVTUOWY6CFPloFrgvt_mpQ8VVQoeqN0QF/exec";

    function voltar() { window.location.href = "index.html"; }

    function iniciarSeparacao() {
      idPedidoAtual = document.getElementById('idPedidoInput').value.trim().toUpperCase();
      if (!idPedidoAtual) return alert("Informe o ID.");

      document.getElementById('setup-container').style.display = 'none';
      document.getElementById('status-container').style.display = 'block';
      document.getElementById('pedidoAtivo').innerText = "Pedido: " + idPedidoAtual;
      document.getElementById('btnFinalizar').style.display = 'inline-block';
      document.getElementById('reader').style.display = 'block';

      startScanner();
    }

    function startScanner() {
      // Configuração de scanner mais estável
      const config = { fps: 10, qrbox: 250 };
      
      scanner.start({ facingMode: "environment" }, config, qrCodeMessage => {
        scanner.pause();
        
        // Monta a URL exatamente como o link de teste que deu certo
        const url = `${BASE_URL}?id=${qrCodeMessage.trim()}&idPedido=${idPedidoAtual}&acao=reservar`;
        
        fetch(url)
          .then(res => res.text())
          .then(msg => {
            document.getElementById('feedback').innerText = "Resultado: " + msg;
            // Se der erro, o alert ajuda a ver o que houve na hora
            if (msg.toLowerCase().includes("erro")) alert(msg);
            scanner.resume();
          })
          .catch(err => {
            alert("Erro na conexão: " + err);
            scanner.resume();
          });
      });
    }

    function finalizar() {
      if (!confirm("Confirmar entrega de todos os itens reservados para o pedido " + idPedidoAtual + "?")) return;
      
      const url = `${BASE_URL}?idPedido=${idPedidoAtual}&acao=finalizar`;
      
      fetch(url).then(res => res.text()).then(msg => {
        alert(msg);
        window.location.href = "index.html";
      });
    }
  </script>
</body>
</html>
