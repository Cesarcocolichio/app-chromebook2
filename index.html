<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Controle de Chromebooks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { text-align: center; background: #111; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
    h1 { margin-bottom: 30px; }
    .btn-main { 
      font-size: 25px; 
      padding: 25px; 
      margin: 15px; 
      width: 80%; 
      max-width: 300px; 
      cursor: pointer; 
      border-radius: 10px; 
      border: none; 
      display: block; 
      margin-left: auto; 
      margin-right: auto;
      font-weight: bold;
    }
    .btn-retirar { background: #2e7d32; color: white; } /* Verde */
    .btn-entregar { background: #f57c00; color: white; } /* Laranja */
    .btn-devolver { background: #1565c0; color: white; } /* Azul */
  </style>
</head>
<body>

  <h1>📦 Controle de Chromebooks</h1>

  <button class="btn-main btn-retirar" onclick="ir('retirar.html')">
    📤 1. Separar Itens
  </button>

  <button class="btn-main btn-entregar" onclick="ir('liberar.html')">
    🚚 2. Entregar ao Prof
  </button>

  <button class="btn-main btn-devolver" onclick="ir('devolver.html')">
    📥 3. Devolver
  </button>

  <script>
    function ir(pagina) {
      window.location.href = pagina;
    }
  </script>

</body>
</html>
